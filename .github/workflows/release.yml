name: Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Windows release
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      PROJECT_FILE: ScreenGlow.csproj
      APP_NAME: ScreenGlow
      RUNTIME_ID: win-x64
      VERSION_PREFIX: 0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 3.1.x

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $version = "$env:VERSION_PREFIX.${{ github.run_number }}"
          $sha = "${{ github.sha }}".Substring(0, 7)
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "asset=$env:APP_NAME-v$version-$env:RUNTIME_ID.zip" >> $env:GITHUB_OUTPUT
          "informational=$version+$sha" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish $env:PROJECT_FILE
          --configuration Release
          --runtime $env:RUNTIME_ID
          --self-contained false
          --output publish\$env:APP_NAME
          /p:PublishSingleFile=true
          /p:SelfContained=false
          /p:PublishSelfContained=false
          /p:DebugType=None
          /p:DebugSymbols=false
          /p:IncludeSymbols=false
          /p:IncludeSource=false
          /p:Version=${{ steps.version.outputs.version }}
          /p:AssemblyVersion=${{ steps.version.outputs.version }}.0
          /p:FileVersion=${{ steps.version.outputs.version }}.0
          /p:InformationalVersion=${{ steps.version.outputs.informational }}

      - name: Remove non-runtime files
        shell: pwsh
        run: |
          Get-ChildItem publish\$env:APP_NAME -Recurse -Include *.pdb,*.xml,*.log,*.tmp -File | Remove-Item -Force

      - name: Show release contents
        shell: pwsh
        run: |
          Get-ChildItem publish\$env:APP_NAME -File | Sort-Object Name | Format-Table Name,Length
          $total = (Get-ChildItem publish\$env:APP_NAME -File | Measure-Object Length -Sum).Sum
          "Total bytes: $total"

      - name: Create archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path "publish\$env:APP_NAME\*" -DestinationPath "artifacts\${{ steps.version.outputs.asset }}" -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ScreenGlow ${{ steps.version.outputs.tag }}
          body: |
            Automated Windows framework-dependent build from main.

            This small portable package requires the .NET Desktop Runtime 3.1 x64 on Windows.

            Commit: ${{ github.sha }}
          files: artifacts/${{ steps.version.outputs.asset }}
